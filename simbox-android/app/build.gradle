plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.shieldinfo.simbox'
    compileSdk 34

    defaultConfig {
        applicationId "com.shieldinfo.simbox"
        minSdk 26          // Android 8.0 — covers 95% of Indian devices
        targetSdk 34
        versionCode 1
        versionName "1.0.0-poc"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'

    // No external HTTP library needed — we use HttpURLConnection (built into Android)
    // No Firebase — we just POST to our own backend
    // Keeping this minimal for POC
}
